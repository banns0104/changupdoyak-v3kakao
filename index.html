<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>어바웃피싱 포인트맵</title>
<!-- ★ 티맵 연동 (카카오맵 엔진) -->
<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=74eb939f1bcf90f450e7b1c3055eb904&libraries=services,clusterer"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--blue:#1A6BFF;--text:#1C1C1E;--sub:#6C6C70;--muted:#AEAEB2;--g1:#F5F5F7;--g2:#E5E5EA;}
html,body{height:100%;font-family:'Noto Sans KR',-apple-system,sans-serif;overflow:hidden;}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;}
@media(max-width:430px){body{background:#fff;align-items:flex-start;}}

.phone{width:390px;height:844px;background:#fff;border-radius:44px;overflow:hidden;position:relative;box-shadow:0 40px 120px rgba(0,0,0,.9);flex-shrink:0;}
@media(max-width:430px){.phone{border-radius:0;width:100vw;height:100dvh;box-shadow:none;}}

/* Status bar */
.sb{height:44px;padding:0 20px;display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:600;position:absolute;top:0;left:0;right:0;z-index:100;pointer-events:none;color:#1C1C1E;}
.sb-r{display:flex;align-items:center;gap:5px;font-size:13px;}
.bat{width:24px;height:12px;border:1.5px solid currentColor;border-radius:3px;padding:1.5px;display:inline-flex;}
.bat-fill{width:80%;height:100%;background:currentColor;border-radius:1px;}

/* Map */
#map{position:absolute;inset:0;z-index:1;}

/* Top bar */
.top-bar{position:absolute;top:44px;left:0;right:0;padding:10px 14px 8px;z-index:20;display:flex;flex-direction:column;gap:8px;}
.map-title{font-size:22px;font-weight:800;color:#1C1C1E;}
.map-title em{color:var(--blue);font-style:normal;}
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border-radius:12px;padding:11px 14px;box-shadow:0 4px 20px rgba(0,0,0,.15);border:1px solid rgba(0,0,0,.06);}
.search-bar input{flex:1;border:none;outline:none;font-family:inherit;font-size:15px;color:var(--text);}
.search-bar input::placeholder{color:var(--muted);}

/* Side buttons */
.side-btns{position:absolute;right:12px;top:156px;display:flex;flex-direction:column;gap:8px;z-index:20;}
.sbn{width:40px;height:40px;background:#fff;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.14);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
.sbn:active{background:var(--g1);}
.sbn svg{width:20px;height:20px;stroke:var(--sub);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}

/* CTA */
.cta{position:absolute;left:14px;right:14px;bottom:80px;background:linear-gradient(135deg,#0d1f3c,#1a3a6b);border-radius:14px 14px 0 0;padding:14px;display:flex;align-items:center;gap:12px;z-index:30;cursor:pointer;transition:opacity .3s,transform .3s;}
.cta-ico{width:42px;height:42px;flex-shrink:0;background:rgba(255,255,255,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.cta-ico svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.cta-txt{flex:1;}
.cta-txt b{display:block;color:#fff;font-size:13px;font-weight:700;margin-bottom:2px;}
.cta-txt span{color:rgba(255,255,255,.7);font-size:12px;}
.cta-x{width:26px;height:26px;flex-shrink:0;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.cta-x svg{width:11px;height:11px;stroke:#fff;stroke-width:2.5;stroke-linecap:round;}

/* Bottom nav */
.bnav{position:absolute;bottom:0;left:0;right:0;height:80px;background:#fff;display:flex;align-items:center;padding:0 0 16px;z-index:100;}

.nitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:10px;font-weight:500;cursor:pointer;transition:color .2s;}
.nitem.on{color:var(--blue);}
.nitem svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}

/* Result sheet */
.sheet{position:absolute;bottom:80px;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;z-index:40;padding-bottom:0;max-height:calc(100% - 80px);display:flex;flex-direction:column;transform:translateY(110%);transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:none;visibility:hidden;clip-path:inset(0 0 -20px 0);}
.sheet.open{box-shadow:0 -4px 24px rgba(0,0,0,.1);visibility:visible;}
.sheet.open{transform:translateY(0);}
.pull{padding:10px 0 4px;display:flex;justify-content:center;flex-shrink:0;}
.pull-bar{width:36px;height:4px;background:var(--g2);border-radius:2px;}
.sheet-list{overflow-y:auto;flex:1;}
.ritem{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--g1);cursor:pointer;}
.ritem:active{background:var(--g1);}
.rthumb{width:56px;height:56px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.rthumb svg{width:26px;height:26px;stroke:rgba(255,255,255,.85);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.rinfo{flex:1;min-width:0;}
.rname{font-size:15px;font-weight:700;color:var(--text);}
.rname span{font-size:12px;color:var(--sub);font-weight:400;}
.rsub{font-size:12px;color:var(--sub);margin-top:2px;}
.rtag{font-size:11px;color:var(--muted);margin-top:2px;}
.fav{width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.fav svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:all .2s;}
.fav.on svg{stroke:var(--blue);fill:var(--blue);}

/* Panel */
.panel{position:absolute;inset:0;background:#fff;z-index:80;transform:translateX(100%);transition:transform .33s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
.panel.open{transform:translateX(0);}
.pnav{height:88px;padding:44px 14px 8px;display:flex;align-items:flex-end;justify-content:space-between;position:absolute;top:0;left:0;right:0;z-index:5;background:#fff;}
.pback{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.pback svg{width:22px;height:22px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;}
.pacts{display:flex;gap:6px;}
.pact{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.pact svg{width:20px;height:20px;stroke:var(--text);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.pscroll{flex:1;overflow-y:auto;padding-bottom:80px;margin-top:88px;-webkit-overflow-scrolling:touch;} /* boat/other panels */
.carousel{display:flex;overflow-x:auto;scrollbar-width:none;}
.carousel::-webkit-scrollbar{display:none;}
.car-slide{flex-shrink:0;width:100%;height:220px;display:flex;align-items:center;justify-content:center;}
.sec{padding:16px 18px 0;}
.sec-ttl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;padding-bottom:10px;border-bottom:1px solid var(--g1);margin-bottom:12px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--g2);border-radius:12px;overflow:hidden;margin-bottom:2px;}
.gc{background:#fff;padding:12px 6px;text-align:center;}
.gl{font-size:11px;color:var(--muted);margin-bottom:4px;}
.gv{font-size:13px;font-weight:700;color:var(--text);}
.row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--g1);font-size:14px;}
.rl{color:var(--muted);}.rv{font-weight:600;color:var(--text);}
.wrow{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.wrow::-webkit-scrollbar{display:none;}
.wc{flex-shrink:0;text-align:center;background:var(--g1);border-radius:8px;padding:8px 10px;min-width:48px;}
.wt{font-size:11px;color:var(--muted);}.we{font-size:16px;margin:3px 0;}.wv{font-size:12px;font-weight:600;color:var(--text);}
.divider{height:8px;background:var(--g1);margin:16px 0 0;}
.chip{display:inline-block;background:var(--g1);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--sub);margin:0 4px 4px 0;}
.nearby-row{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding:0 18px 4px;}
.nearby-row::-webkit-scrollbar{display:none;}
.ncard{flex-shrink:0;width:140px;border-radius:12px;overflow:hidden;border:1px solid var(--g2);cursor:pointer;}
.ncard-img{height:78px;display:flex;align-items:center;justify-content:center;}
.ncard-img svg{width:30px;height:30px;stroke:rgba(255,255,255,.85);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.ncard-info{padding:8px 10px;}
.ncard-name{font-size:12px;font-weight:600;color:var(--text);}
.ncard-price{font-size:11px;color:var(--blue);margin-top:2px;}
.go-btn{display:block;width:calc(100% - 36px);margin:16px 18px 8px;background:var(--blue);color:#fff;border:none;border-radius:13px;padding:17px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;}
.tmap-btn{display:flex;align-items:center;gap:8px;padding:11px 14px;background:linear-gradient(90deg,#7B2FFF 0%,#2ECBFF 100%);border-radius:10px;color:#fff;font-size:13px;font-weight:700;text-decoration:none;margin-bottom:10px;cursor:pointer;}
.tmap-logo{width:22px;height:22px;border-radius:4px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tmap-logo svg{width:14px;height:14px;}

/* Boat sheet */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0);z-index:70;pointer-events:none;transition:background .3s;}
.overlay.on{background:rgba(0,0,0,.45);pointer-events:all;}
.bsheet{position:absolute;bottom:80px;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;z-index:60;padding:0 18px 20px;transform:translateY(110%);transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:none;}
.bsheet.open{box-shadow:0 -4px 24px rgba(0,0,0,.15);}
.bsheet.open{transform:translateY(0);}
.brow{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--g1);}
.bthumb{width:62px;height:62px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bthumb svg{width:28px;height:28px;stroke:rgba(255,255,255,.85);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.bname{font-size:17px;font-weight:700;color:var(--text);}
.bloc{font-size:13px;color:var(--sub);margin-top:2px;}
.btmap{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);margin-top:3px;}
.tmi{width:14px;height:14px;border-radius:3px;background:linear-gradient(135deg,#FEE500,#FF6B35);display:flex;align-items:center;justify-content:center;color:#3C1E1E;font-size:7px;font-weight:800;}
.bbtns{display:flex;gap:8px;margin-top:4px;}
.bbtn-o{flex:1;padding:15px;border:1.5px solid var(--g2);border-radius:12px;font-size:14px;font-weight:600;background:#fff;color:var(--text);cursor:pointer;font-family:inherit;}
.bbtn-f{flex:2;padding:15px;border-radius:12px;font-size:14px;font-weight:700;background:var(--blue);color:#fff;border:none;cursor:pointer;font-family:inherit;}

/* ── PREF PANEL — Premium Ocean Dark Theme ── */
#panel-pref{background:#0a0f1e;}
.pref-header{
  position:absolute;top:44px;left:0;right:0;
  height:52px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:5;
}
.pref-back-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .2s;
}
.pref-back-btn:active{background:rgba(255,255,255,.2);}
.pref-back-btn svg{stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;width:20px;height:20px;}
.pref-step-badge{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.7);
  font-size:12px;font-weight:600;
  padding:5px 12px;border-radius:20px;
}
/* Progress dots */
.pref-progress{
  display:flex;align-items:center;justify-content:center;
  gap:8px;padding:106px 0 0;
}
.prog-dot{
  width:6px;height:6px;border-radius:3px;
  background:rgba(255,255,255,.2);
  transition:all .35s cubic-bezier(.4,0,.2,1);
}
.prog-dot.done{background:rgba(255,255,255,.5);width:6px;}
.prog-dot.active{background:#fff;width:24px;}

/* Pref scroll */
.pref-scroll{
  flex:1;overflow-y:auto;
  padding:0 0 160px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.pref-scroll::-webkit-scrollbar{display:none;}

/* Section heading */
.pref-ttl{
  font-size:26px;font-weight:800;
  color:#fff;line-height:1.25;
  padding:24px 20px 6px;
  letter-spacing:-.3px;
}
.pref-ttl em{color:#4B9FFF;font-style:normal;}
.pref-sub{
  font-size:14px;color:rgba(255,255,255,.5);
  padding:0 20px 20px;line-height:1.6;
}

/* Date chips */
.date-scroll{display:flex;gap:10px;padding:4px 20px 16px;overflow-x:auto;scrollbar-width:none;}
.date-scroll::-webkit-scrollbar{display:none;}
.date-chip{
  flex-shrink:0;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:16px;padding:12px 14px;
  cursor:pointer;transition:all .2s;min-width:80px;text-align:center;
}
.date-chip.on{
  background:rgba(75,159,255,.2);
  border-color:#4B9FFF;
}
.date-chip:active{transform:scale(.96);}
.dc-mo{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:3px;}
.dc-d{font-size:20px;font-weight:800;color:#fff;}
.dc-wd{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.dc-tide{font-size:10px;margin-top:5px;padding:2px 6px;border-radius:6px;font-weight:600;}
.dc-tide.good{background:rgba(52,199,89,.2);color:#34C759;}
.dc-tide.ok{background:rgba(255,149,0,.2);color:#FF9500;}
.dc-tide.bad{background:rgba(255,59,48,.15);color:#FF3B30;}

/* Section divider */
.pref-section{padding:0 20px;margin-bottom:16px;}
.pref-section-ttl{
  font-size:12px;font-weight:700;
  color:rgba(255,255,255,.4);
  letter-spacing:.8px;text-transform:uppercase;
  margin-bottom:12px;
}

/* People row */
.people-row{display:flex;gap:8px;}
.people-btn{
  flex:1;height:52px;border-radius:12px;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.8);font-family:inherit;
  font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
}
.people-btn.on{background:rgba(75,159,255,.2);border-color:#4B9FFF;}
.people-btn:active{transform:scale(.97);}

/* Level cards */
.level-row{display:flex;gap:8px;}
.level-card{
  flex:1;border-radius:14px;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.1);
  padding:14px 10px;cursor:pointer;
  transition:all .2s;text-align:center;
}
.level-card.on{background:rgba(75,159,255,.2);border-color:#4B9FFF;}
.level-card:active{transform:scale(.97);}
.lv-ico{margin-bottom:6px;display:flex;justify-content:center;height:22px;align-items:center;}
.lv-name{font-size:13px;font-weight:700;color:#fff;}
.lv-desc{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px;}

/* Big Y/N toggle */
.yn-toggle{display:flex;gap:10px;padding:0;}
.yn-card{
  flex:1;border-radius:16px;
  border:1.5px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);
  padding:20px 12px;cursor:pointer;
  transition:all .25s;text-align:center;
}
.yn-card.yes.on{background:rgba(75,159,255,.2);border-color:#4B9FFF;}
.yn-card.no.on{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.2);}
.yn-card:active{transform:scale(.97);}
.yn-ico{margin-bottom:10px;display:flex;justify-content:center;}
.yn-lbl{font-size:15px;font-weight:700;color:#fff;}
.yn-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;}

/* Option grid */
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.opt-card{
  border-radius:14px;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.1);
  padding:16px 12px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.opt-card.on{background:rgba(75,159,255,.15);border-color:#4B9FFF;}
.opt-card:active{transform:scale(.97);}
.opt-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.03),transparent);
}
.opt-ico{font-size:24px;margin-bottom:8px;}
.opt-name{font-size:13px;font-weight:700;color:#fff;}
.opt-desc{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px;}
.opt-price{
  font-size:11px;font-weight:600;
  color:#4B9FFF;margin-top:5px;
}
.opt-check{
  position:absolute;top:10px;right:10px;
  width:18px;height:18px;border-radius:50%;
  background:#4B9FFF;
  display:none;align-items:center;justify-content:center;
}
.opt-card.on .opt-check{display:flex;}
.opt-check svg{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;}

/* Food chips (horizontal scroll) */
.food-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:0;}
.food-row::-webkit-scrollbar{display:none;}
.food-chip{
  flex-shrink:0;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:50px;
  padding:10px 16px;cursor:pointer;
  transition:all .2s;
  display:flex;align-items:center;gap:7px;
  white-space:nowrap;
}
.food-chip.on{background:rgba(75,159,255,.2);border-color:#4B9FFF;}
.food-chip-ico{font-size:16px;}
.food-chip-txt{font-size:13px;font-weight:600;color:#fff;}

/* CTA next button */
.pref-next{
  position:absolute;bottom:80px;left:0;right:0;
  padding:12px 20px 16px;
  background:linear-gradient(to top,#0a0f1e 85%,transparent);
  z-index:5;
}
.pref-next-btn{
  width:100%;background:linear-gradient(135deg,#1A6BFF,#0d4fd4);
  color:#fff;border:none;border-radius:16px;
  padding:18px;font-size:16px;font-weight:700;
  cursor:pointer;font-family:inherit;
  box-shadow:0 8px 24px rgba(26,107,255,.4);
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.pref-next-btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;}
.pref-next-btn:not(:disabled):active{transform:scale(.98);}

/* ── FINAL PLAN — Light Editorial Premium ── */
#panel-final{background:#f8f9fc;}
.final-back{
  position:absolute;top:50px;left:14px;z-index:20;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
  box-shadow:0 2px 10px rgba(0,0,0,.15);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.final-back svg{stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;width:20px;height:20px;}
.plan-scroll{flex:1;overflow-y:auto;padding-bottom:230px;margin-top:0;}

/* Hero card */
.plan-hero{
  background:linear-gradient(160deg,#0d1f3c 0%,#1a3a6b 60%,#0d3358 100%);
  padding:80px 20px 28px;
  position:relative;overflow:hidden;
}
.plan-hero::before{
  content:'';position:absolute;
  top:-60px;right:-40px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(75,159,255,.2),transparent 70%);
  pointer-events:none;
}
.plan-hero::after{
  content:'';position:absolute;
  bottom:-30px;left:-20px;
  width:160px;height:160px;
  background:radial-gradient(circle,rgba(0,200,150,.1),transparent 70%);
  pointer-events:none;
}
.plan-fish-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(75,159,255,.2);
  border:1px solid rgba(75,159,255,.3);
  border-radius:20px;padding:5px 12px;
  font-size:12px;font-weight:600;color:#4B9FFF;
  margin-bottom:12px;
}
.plan-date-big{font-size:28px;font-weight:800;color:#fff;line-height:1.2;letter-spacing:-.3px;}
.plan-name-tag{font-size:14px;color:rgba(255,255,255,.6);margin-top:6px;}
.plan-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;}
.plan-tag{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:5px 12px;
  font-size:12px;color:rgba(255,255,255,.8);
}
.plan-tag.hi{background:rgba(52,199,89,.2);border-color:rgba(52,199,89,.3);color:#34C759;}

/* Stats row */
.plan-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:#e8ecf0;
}
.plan-stat{
  background:#fff;padding:16px 8px;text-align:center;
}
.ps-val{font-size:18px;font-weight:800;color:var(--text);}
.ps-unit{font-size:11px;color:var(--muted);margin-left:2px;}
.ps-lbl{font-size:11px;color:var(--muted);margin-top:3px;}

/* Section card */
.plan-card{
  background:#fff;border-radius:20px;
  margin:12px 16px 0;
  overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.pc-head{
  padding:16px 18px 12px;
  border-bottom:1px solid var(--g1);
  display:flex;align-items:center;justify-content:space-between;
}
.pc-ttl{
  font-size:13px;font-weight:700;
  color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.pc-ico{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
}
.pc-action{font-size:12px;color:var(--blue);font-weight:600;cursor:pointer;}

/* Forecast strip */
.forecast-row{display:flex;overflow-x:auto;scrollbar-width:none;padding:12px 18px;}
.forecast-row::-webkit-scrollbar{display:none;}
.fc-item{flex-shrink:0;text-align:center;min-width:52px;padding:8px 4px;}
.fc-time{font-size:10px;color:var(--muted);margin-bottom:6px;}
.fc-ico{font-size:18px;margin-bottom:5px;}
.fc-temp{font-size:12px;font-weight:700;color:var(--text);}
.fc-wind{font-size:10px;color:var(--muted);margin-top:2px;}

/* Tide chart */
.tide-chart{padding:12px 18px 16px;}
.tide-bar-wrap{display:flex;align-items:flex-end;gap:4px;height:48px;margin-bottom:6px;}
.tide-bar{
  flex:1;border-radius:4px 4px 0 0;
  transition:background .2s;
  min-width:0;
}
.tide-bar.best{background:#34C759;}
.tide-bar.good{background:#4B9FFF;}
.tide-bar.ok{background:#E5E5EA;}
.tide-labels{display:flex;justify-content:space-between;padding:0 2px;}
.tide-lbl{font-size:9px;color:var(--muted);}
.tide-legend{display:flex;gap:12px;margin-top:8px;}
.tl-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--sub);}
.tl-dot{width:8px;height:8px;border-radius:2px;}

/* Timeline */
.tl-card{padding:16px 18px;}
.tl2-row{display:flex;gap:0;position:relative;padding-left:80px;margin-bottom:28px;}
.tl2-row:last-child{margin-bottom:0;}
.tl2-time{
  position:absolute;left:0;top:3px;
  width:44px;text-align:right;
  font-size:11px;font-weight:600;color:var(--muted);
  line-height:1.3;
}
.tl2-line{
  position:absolute;left:60px;top:18px;bottom:-28px;
  width:1.5px;background:var(--g2);
}
.tl2-row:last-child .tl2-line{display:none;}
.tl2-dot{
  position:absolute;left:56px;top:5px;
  width:10px;height:10px;border-radius:50%;
  background:#fff;border:2.5px solid var(--g2);
  z-index:1;
}
.tl2-dot.active{border-color:var(--blue);background:var(--blue);}
.tl2-body{flex:1;padding-left:4px;}
.tl2-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.3;}
.tl2-move{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--g1);border-radius:6px;
  padding:3px 8px;font-size:11px;color:var(--sub);
  margin:4px 0;font-weight:500;
}
.tl2-desc{font-size:13px;color:var(--sub);line-height:1.55;margin-top:4px;}
.tl2-link{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;color:var(--blue);font-weight:600;
  margin-top:6px;cursor:pointer;
}
.tl2-tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.tl2-tag{
  background:rgba(26,107,255,.08);
  border-radius:6px;padding:3px 8px;
  font-size:11px;color:var(--blue);font-weight:500;
}

/* Cost breakdown */
.cost-list{padding:0 18px 16px;}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--g1);}
.cost-row:last-child{border-bottom:none;}
.cost-label{font-size:14px;color:var(--text);}
.cost-label span{font-size:11px;color:var(--muted);margin-left:4px;}
.cost-val{font-size:14px;font-weight:700;color:var(--text);}
.cost-total{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:rgba(26,107,255,.06);margin:0;}
.cost-total-lbl{font-size:14px;font-weight:700;color:var(--text);}
.cost-total-val{font-size:20px;font-weight:800;color:var(--blue);}

/* Checklist */
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 18px 16px;}
.check-item{
  display:flex;align-items:center;gap:8px;
  background:var(--g1);border-radius:10px;
  padding:10px 12px;cursor:pointer;
}
.check-item.done .check-box{background:var(--blue);border-color:var(--blue);}
.check-item.done .check-box svg{display:block;}
.check-item.done .check-txt{color:var(--muted);text-decoration:line-through;}
.check-box{
  width:18px;height:18px;flex-shrink:0;
  border-radius:5px;border:2px solid var(--g2);
  background:#fff;display:flex;align-items:center;justify-content:center;
}
.check-box svg{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;display:none;}
.check-txt{font-size:12px;font-weight:500;color:var(--text);}

/* Spot card */
.spot-card{
  margin:0 18px 16px;
  background:linear-gradient(135deg,#0d1f3c,#1a3a6b);
  border-radius:14px;padding:16px;
  position:relative;overflow:hidden;
}
.spot-card::before{
  content:'';position:absolute;
  top:-30px;right:-30px;width:100px;height:100px;
  background:radial-gradient(circle,rgba(75,159,255,.2),transparent);
}
.spot-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:3px;}
.spot-sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:12px;}
.spot-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.sst{text-align:center;}
.sst-v{font-size:16px;font-weight:800;color:#fff;}
.sst-l{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px;}

/* Recommended cards */
.rec-row{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding:0 18px 16px;}
.rec-row::-webkit-scrollbar{display:none;}
.rec-card{
  flex-shrink:0;width:160px;border-radius:12px;
  background:var(--g1);overflow:hidden;cursor:pointer;
}
.rec-img{height:80px;display:flex;align-items:center;justify-content:center;font-size:28px;}
.rec-info{padding:10px 12px;}
.rec-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rec-meta{font-size:11px;color:var(--muted);margin-top:3px;}
.rec-price{font-size:12px;font-weight:700;color:var(--blue);margin-top:4px;}

/* Bottom action */
.plan-actions{
  position:absolute;bottom:80px;left:0;right:0;
  background:#fff;
  box-shadow:0 -8px 24px rgba(0,0,0,.12);
  padding:12px 16px 16px;
  display:flex;gap:10px;
  z-index:15;
}
.pa{
  flex:1;padding:14px;border-radius:14px;
  font-size:15px;font-weight:700;border:none;
  cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .2s;
}
.pa:active{transform:scale(.98);}
.pa-yes{background:var(--blue);color:#fff;box-shadow:0 4px 16px rgba(26,107,255,.35);}
.pa-no{background:var(--g1);color:var(--sub);}

.tmap-badge-sm{width:14px;height:14px;border-radius:3px;background:linear-gradient(90deg,#7B2FFF 0%,#2ECBFF 100%);display:flex;align-items:center;justify-content:center;}
.tmap-badge-sm svg{width:12px;height:12px;}
/* TMap navigation CTA */
.tmap-nav-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(90deg,#7B2FFF 0%,#2ECBFF 100%);
  color:#fff;border:none;border-radius:14px;
  padding:16px 20px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:inherit;width:100%;
  box-shadow:0 6px 20px rgba(123,47,255,.35);
  transition:all .2s;
}
.tmap-nav-btn:active{transform:scale(.98);}
.tmap-nav-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
/* Marker drop animation */
@keyframes markerDrop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3) translateY(-30px);}60%{transform:translate(-50%,-50%) scale(1.18) translateY(4px);}80%{transform:translate(-50%,-50%) scale(.95);}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}
@keyframes markerPulse{0%{box-shadow:0 2px 8px rgba(26,107,255,.5),0 0 0 0 rgba(26,107,255,.45);}70%{box-shadow:0 2px 8px rgba(26,107,255,.5),0 0 0 16px rgba(26,107,255,0);}100%{box-shadow:0 2px 8px rgba(26,107,255,.5),0 0 0 0 rgba(26,107,255,0);}}
.dm-anim{animation:markerDrop .42s cubic-bezier(.34,1.56,.64,1) both;}
.dm-pulse .dm{animation:markerPulse 1.4s ease-out 0.3s;}
.bm-anim{animation:markerDrop .42s cubic-bezier(.34,1.56,.64,1) both;}
/* ── Custom Clusterer Overlay ── */
.kc-wrap{cursor:pointer;position:relative;}
.kc-outer{
  border-radius:50%;
  background:rgba(26,107,255,.12);
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  animation:clusterRing 2.5s ease-out infinite;
  pointer-events:none;
}
.kc-inner{
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#4d8cff,#0040d0);
  border:2.5px solid rgba(255,255,255,.95);
  color:#fff;
  font-weight:900;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(26,107,255,.55);
  cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  line-height:1;gap:2px;
  position:relative;
  transition:transform .2s;
}
.kc-wrap:hover .kc-inner{transform:scale(1.1);}
.kc-n{font-weight:900;letter-spacing:-.5px;}
.kc-lbl{font-size:8px;font-weight:600;opacity:.8;}
/* ── Premium Cluster Marker (legacy) ── */
@keyframes clusterPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.4);}
  70%{transform:translate(-50%,-50%) scale(1.1);}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1);}
}
@keyframes clusterRing{
  0%{box-shadow:0 0 0 0 rgba(26,107,255,.6),0 6px 20px rgba(26,107,255,.4);}
  70%{box-shadow:0 0 0 12px rgba(26,107,255,0),0 6px 20px rgba(26,107,255,.4);}
  100%{box-shadow:0 0 0 0 rgba(26,107,255,0),0 6px 20px rgba(26,107,255,.4);}
}
.cm-wrap{
  cursor:pointer;
  animation:clusterPop .4s cubic-bezier(.34,1.56,.64,1) both;
}
.cm{
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #3d8eff, #0040d0);
  border:2.5px solid rgba(255,255,255,.95);
  color:#fff;
  font-weight:900;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(26,107,255,.5);
  cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  line-height:1;gap:2px;
  position:relative;
  transition:transform .2s;
  animation:clusterRing 2s ease-out 0.5s infinite;
}
.cm::before{
  content:'';
  position:absolute;inset:-4px;
  border-radius:50%;
  background:rgba(26,107,255,.15);
  z-index:-1;
}
.cm-wrap:hover .cm{transform:scale(1.1);}
.cm-n{font-size:inherit;font-weight:900;letter-spacing:-.5px;}
.cm-lbl{font-size:9px;font-weight:600;opacity:.85;letter-spacing:.2px;}
/* Premium individual marker */
.dm{
  width:38px;height:38px;
  background:linear-gradient(145deg,#fff,#f0f4ff);
  border:2.5px solid var(--blue);
  border-radius:50% 50% 50% 4px;
  transform:rotate(-45deg);
  box-shadow:0 3px 12px rgba(26,107,255,.4);
  display:flex;align-items:center;justify-content:center;
}
.dm svg{transform:rotate(45deg);width:18px;height:18px;stroke:var(--blue);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
/* Catch marker - see Premium individual marker above */
/* Boat marker */
.bm{width:44px;height:44px;background:#1C3A6B;border:2.5px solid rgba(255,255,255,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.3);position:relative;cursor:pointer;}
.bm svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.bm-dot{position:absolute;top:-1px;right:-1px;width:11px;height:11px;background:#FF3B30;border-radius:50%;border:2px solid #fff;}

/* Loading screen */
@keyframes loadSpin{to{transform:rotate(360deg);}}
@keyframes loadPulse{0%,100%{opacity:.3;transform:scale(.95);}50%{opacity:1;transform:scale(1.05);}}
@keyframes loadBar{0%{width:0%;}100%{width:100%;}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.load-ring{
  width:64px;height:64px;border-radius:50%;
  border:3px solid rgba(255,255,255,.1);
  border-top-color:#4B9FFF;
  animation:loadSpin 1s linear infinite;
  margin-bottom:28px;
}
.load-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:8px;animation:fadeInUp .5s ease both;}
.load-sub{font-size:14px;color:rgba(255,255,255,.5);line-height:1.6;animation:fadeInUp .5s .1s ease both;margin-bottom:32px;}
.load-steps{width:100%;display:flex;flex-direction:column;gap:12px;}
.load-step{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,.05);animation:fadeInUp .4s ease both;}
.load-step-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.load-step-txt{text-align:left;}
.load-step-lbl{font-size:13px;font-weight:700;color:#fff;}
.load-step-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}
.load-bar-wrap{width:100%;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:32px;overflow:hidden;}
.load-bar-fill{height:100%;background:linear-gradient(90deg,#4B9FFF,#7B2FFF);border-radius:2px;animation:loadBar 2.8s ease-in-out forwards;}
.toast{position:absolute;top:76px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>

function addSVGMarkers(){
  var mapEl=document.getElementById('map');

  ov.style.cssText='position:absolute;inset:0;z-index:2;pointer-events:none;';
  mapEl.appendChild(ov);
  SVG_CLUSTERS.forEach(function(cl){
    var sz=cl.n>200?72:cl.n>60?58:cl.n>30?48:42;
    var fs=cl.n>200?17:cl.n>60?15:13;
    var px=cl.sx*svgZoom.scale+svgZoom.tx;
    var py=cl.sy*svgZoom.scale+svgZoom.ty;
    var el=document.createElement('div');
    el.className='kc-inner';
    el.style.cssText='position:absolute;width:'+sz+'px;height:'+sz+'px;font-size:'+fs+'px;left:'+px+'px;top:'+py+'px;transform:translate(-50%,-50%);pointer-events:all;cursor:pointer;';
    el.innerHTML='<span class="kc-n">'+cl.n+'</span><span class="kc-lbl">'+cl.fish.split(',')[0]+'</span>';
    el.addEventListener('click',(function(cll){return function(){zoomSVG(cll,false);};})(cl));
    ov.appendChild(el);
  });
}

function zoomSVG(cl, keepQ){
  svgMode='detail';G.mode='detail';
  G_CLUSTER_IDX=cl.cidx!==undefined?cl.cidx:3;
  if(!keepQ){
    G.q=cl.fish.split(',')[0];
    G.searchQ='';
    document.getElementById('searchInput').value=G.q;
  }
  setFilteredCatches(G_CLUSTER_IDX, G.searchQ||G.q);
  toggleClearBtn();
  hideCTA();
  var scale=2.2;
  svgZoom={scale:scale,tx:195-(cl.sx||195)*scale,ty:390-(cl.sy||422)*scale};
  var svg=document.getElementById('ksvg');
  if(svg)svg.style.transform='scale('+scale+') translate('+svgZoom.tx/scale+'px,'+svgZoom.ty/scale+'px)';
  setTimeout(function(){
    var ov=document.getElementById('svg-ov');if(ov)ov.remove();
    showSheet(G.searchQ||G.q);
  },450);
}

function resetSVGView(){

    // 지도 클릭 시 시트 닫기
    kakao.maps.event.addListener(MAP,'click',function(){
      hideSheet();
    });
    addClusters();
  } else {
    mapEl.innerHTML=svgKoreaMap();
    mapEl.style.background='#c8d9e6';
    addSVGMarkers();
    mapEl.addEventListener('click',function(e){
      if(e.target===mapEl||e.target.id==='ksvg'||e.target.tagName==='rect'||e.target.tagName==='path'||e.target.tagName==='text'){
        hideSheet();
      }
    });
  }
}

function mkLatLng(lat,lng){return new kakao.maps.LatLng(lat,lng);}

function addOverlay(lat,lng,html,zIdx,onClick){
  var div=document.createElement('div');
  div.innerHTML=html;
  var el=div.firstElementChild;
  el.addEventListener('click',onClick);
  var ov=new kakao.maps.CustomOverlay({position:mkLatLng(lat,lng),content:el,zIndex:zIdx||3,yAnchor:0.5,xAnchor:0.5});
  ov.setMap(MAP);
  MARKERS.push(ov);
  return ov;
}

function clearMarkers(){MARKERS.forEach(function(m){m.setMap(null);});MARKERS=[];}

function clearBoatMarkers(){BOAT_MARKERS.forEach(function(m){m.setMap(null);});BOAT_MARKERS=[];}

var CATCH_CLUSTERER=null;
var ALL_CATCH_MARKERS=[];

function addClusters(){
  clearMarkers();
  if(CATCH_CLUSTERER){CATCH_CLUSTERER.clear();CATCH_CLUSTERER=null;}
  clearBoatMarkers();
  ALL_CATCH_MARKERS.forEach(function(m){m.setMap(null);});
  ALL_CATCH_MARKERS=[];
  if(!USE_KAKAO)return;
  CLUSTERS.forEach(function(cl){
    var sz=cl.n>200?72:cl.n>60?58:cl.n>30?48:42;
    var fs=cl.n>200?17:cl.n>60?15:13;
    var outerSz=(sz+16)+'px';
    var mainFish=cl.fish.split(',')[0];
    var html='<div class="kc-wrap">'
      +'<div class="kc-outer" style="width:'+outerSz+';height:'+outerSz+';"></div>'
      +'<div class="kc-inner" style="width:'+sz+'px;height:'+sz+'px;font-size:'+fs+'px;">'
        +'<span class="kc-n">'+cl.n+'</span>'
        +'<span class="kc-lbl">'+mainFish+'</span>'
      +'</div></div>';
    addOverlay(cl.lat,cl.lng,html,3,(function(cll){return function(){zoomToCluster(cll);};})(cl));
  });
  addBoatMarkersToMap();
}

function addBoatMarkersToMap(){
  if(!USE_KAKAO||!MAP)return;
  clearBoatMarkers();
  BOATS.forEach(function(b,i){
    var delay=(200+i*120)+'ms';
    var dot=b.id%2===1?'<div class="bm-dot"></div>':'';
    var bname=b.name.split(' ').slice(0,2).join(' ');
    var html='<div style="cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;animation:markerDrop .4s cubic-bezier(.34,1.56,.64,1) '+delay+' both;">'
      +'<div style="background:#1C3A6B;border:2.5px solid rgba(255,255,255,.9);border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.35);position:relative;">'
        +ICO_ANCHOR+dot
      +'</div>'
      +'<div style="background:rgba(28,58,107,.92);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;">'+bname+'</div>'
    +'</div>';
    var div=document.createElement('div');
    div.innerHTML=html;
    var el=div.firstElementChild;
    el.addEventListener('click',(function(bb){return function(){
      ['panel-catch','panel-boat'].forEach(function(pid){document.getElementById(pid).classList.remove('open');});
      openBoat(bb);
    };})(b));
    var ov=new kakao.maps.CustomOverlay({position:mkLatLng(b.lat,b.lng),content:el,zIndex:6,yAnchor:1.1,xAnchor:0.5});
    ov.setMap(MAP);
    BOAT_MARKERS.push(ov);
  });
}

function addCatchMarkers(){
  if(USE_KAKAO){buildCatchClusterer();return;}
  clearMarkers();
  CATCHES.forEach(function(cc,i){
    var delay=(i*80)+'ms';
    var html='<div class="dm-wrap dm-anim dm-pulse" style="animation-delay:'+delay+'"><div class="dm">'+ICO_ROD+'</div></div>';
    addOverlay(cc.lat,cc.lng,html,4,(function(ccc){return function(){openCatch(ccc);};})(cc));
  });
}

function addDetailMarkers(){
  if(USE_KAKAO){buildCatchClusterer();addBoatMarkersToMap();}
  else{addCatchMarkers();}
}

function getBoatThumb(idx){
  var url=BOAT_THUMBS[idx%BOAT_THUMBS.length];
  return '<img src="'+url+'" style="width:100%;height:100%;object-fit:cover;">';
}

function doSearch(){
  var q=(document.getElementById('searchInput').value||'').trim();
  if(!q)return;
  document.getElementById('searchInput').blur();
  G.q=q;
  G.searchQ=q;

  if(!USE_KAKAO){
    // SVG 모드: 가장 많은 클러스터로 이동
    var bestIdx=3, bestCnt=0;
    ['c0','c1','c2','c3','c4','c5'].forEach(function(k,i){
      var cnt=(ALL_CATCHES[k]||[]).filter(function(r){return r.fish===q||r.fish.indexOf(q)!==-1;}).length;
      if(cnt>bestCnt){bestCnt=cnt;bestIdx=i;}
    });
    G_CLUSTER_IDX=bestIdx;
    CATCHES=getAllMatchingCatches(q);
    zoomSVG(CLUSTERS[bestIdx], true);
    setTimeout(function(){showSheet(q);},500);
    return;
  }

  // 카카오맵 모드: 전국 모든 클러스터에서 해당 어종 수집
  var allMatches=getAllMatchingCatches(q);
  CATCHES=allMatches;

  if(allMatches.length===0){
    showToast('검색 결과가 없습니다');
    return;
  }

  G.mode='detail';
  hideCTA();
  clearMarkers(); // 전국 요약 오버레이 제거
  if(CATCH_CLUSTERER){CATCH_CLUSTERER.clear();CATCH_CLUSTERER=null;}
  ALL_CATCH_MARKERS.forEach(function(m){m.setMap(null);});
  ALL_CATCH_MARKERS=[];

  // 전국 지도 레벨 유지 (검색 결과를 전국에 뿌림)
  MAP.setLevel(8);

  // 마커 아이콘 생성
  var svgIcon=[
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 38 38" width="38" height="38">',
    '<circle cx="19" cy="19" r="17" fill="#1A6BFF" stroke="white" stroke-width="2.5"/>',
    '<line x1="11" y1="27" x2="25" y2="13" stroke="white" stroke-width="2.2" stroke-linecap="round"/>',
    '<path d="M25 13 a1.5 1.5 0 0 1 1.5 1.5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>',
    '<line x1="21" y1="17" x2="23" y2="19" stroke="white" stroke-width="1.8" stroke-linecap="round"/>',
    '</svg>'
  ].join('');
  var svgB64='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svgIcon)));
  var markerImg=new kakao.maps.MarkerImage(svgB64,new kakao.maps.Size(38,38),{offset:new kakao.maps.Point(19,38)});

  // 전국에 개별 마커 배치 (클러스터링 없이)
  allMatches.forEach(function(cc){
    var km=new kakao.maps.Marker({
      position:mkLatLng(cc.lat,cc.lng),
      image:markerImg,
      clickable:true
    });
    // 클릭 시 해당 위치로 이동 + 조과 상세 팝업
    kakao.maps.event.addListener(km,'click',(function(ccc){return function(){
      MAP.setCenter(mkLatLng(ccc.lat,ccc.lng));
      MAP.setLevel(5,{animate:true});
      openCatch(ccc);
    };})(cc));
    km.setMap(MAP);
    ALL_CATCH_MARKERS.push(km);
  });

  showSheet(q);
}

// 전체 클러스터에서 어종 검색
function getAllMatchingCatches(q){
  var result=[];
  // 정확히 해당 어종만 (fish === q)인 조과 먼저
  ['c0','c1','c2','c3','c4','c5'].forEach(function(k){
    var exact=(ALL_CATCHES[k]||[]).filter(function(cc){return cc.fish===q;});
    result=result.concat(exact);
  });
  // 정확 일치가 없으면 포함 검색
  if(result.length===0){
    ['c0','c1','c2','c3','c4','c5'].forEach(function(k){
      var partial=(ALL_CATCHES[k]||[]).filter(function(cc){return cc.fish.indexOf(q)!==-1;});
      result=result.concat(partial);
    });
  }
  return result;
}

// 특정 클러스터 어종 필터
function setFilteredCatches(cidx, q){
  var all=ALL_CATCHES['c'+cidx]||ALL_CATCHES.c3;
  if(q){
    var filtered=all.filter(function(cc){return cc.fish===q||cc.fish.indexOf(q)!==-1;});
    CATCHES=filtered.length>0?filtered:all;
  } else {
    CATCHES=all;
  }
}

function zoomToCluster(cl){
  // 클러스터 클릭: G.q를 덮어쓰지 않고 클러스터 데이터만 로드
  var wasSearch=!!(G.searchQ);
  G.mode='detail';
  G_CLUSTER_IDX=cl.cidx!==undefined?cl.cidx:3;

  if(!wasSearch){
    // 검색 없이 클러스터 클릭 → 클러스터 기본 어종
    G.q=cl.fish.split(',')[0];
    G.searchQ='';
    document.getElementById('searchInput').value=G.q;
    toggleClearBtn();
    setFilteredCatches(G_CLUSTER_IDX, '');
  } else {
    // 검색 후 클러스터 클릭 → 검색어 유지
    setFilteredCatches(G_CLUSTER_IDX, G.searchQ);
  }

  hideCTA();
  clearMarkers();
  if(CATCH_CLUSTERER){CATCH_CLUSTERER.clear();CATCH_CLUSTERER=null;}
  ALL_CATCH_MARKERS.forEach(function(m){m.setMap(null);});
  ALL_CATCH_MARKERS=[];

  MAP.setCenter(mkLatLng(cl.lat,cl.lng));
  MAP.setLevel(7,{animate:true});
  setTimeout(function(){
    buildCatchClusterer();
    // 클러스터 클릭만으론 시트 안 열고 사용자가 더 확대하면 열림
  },600);
}

function onZoom(){
  if(!MAP)return;
  var lv=MAP.getLevel();
  if(G.mode==='detail'){
    if(lv>=8){
      // 충분히 축소 → 전국 뷰 복귀
      G.mode='korea';
      G.searchQ='';
      if(CATCH_CLUSTERER){CATCH_CLUSTERER.clear();CATCH_CLUSTERER=null;}
      ALL_CATCH_MARKERS.forEach(function(m){m.setMap(null);});
      ALL_CATCH_MARKERS=[];
      clearMarkers();
      addClusters();
      hideSheet();
      document.getElementById('searchInput').value='';
      G.q='';
      toggleClearBtn();
      if(G.ctaOn){
        document.getElementById('cta').style.cssText='opacity:1;display:flex;transform:none;';
      }
    } else if(lv<=4 && !document.getElementById('sheet').classList.contains('open')){
      var displayQ=G.searchQ||G.q;
      showSheet(displayQ);
    }
  }
}

function buildCatchClusterer(){
  if(!USE_KAKAO||!MAP)return;

  if(CATCH_CLUSTERER){CATCH_CLUSTERER.clear();CATCH_CLUSTERER=null;}
  ALL_CATCH_MARKERS.forEach(function(m){m.setMap(null);});
  ALL_CATCH_MARKERS=[];

  // 현재 CATCHES 사용 (이미 setFilteredCatches로 필터링됨)
  var catches=CATCHES;
  if(!catches||catches.length===0){
    catches=ALL_CATCHES['c'+G_CLUSTER_IDX]||ALL_CATCHES.c3;
  }

  // 낚싯대 SVG 마커 아이콘
  var svgIcon=[
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 38 38" width="38" height="38">',
    '<circle cx="19" cy="19" r="17" fill="#1A6BFF" stroke="white" stroke-width="2.5"/>',
    '<line x1="11" y1="27" x2="25" y2="13" stroke="white" stroke-width="2.2" stroke-linecap="round"/>',
    '<path d="M25 13 a1.5 1.5 0 0 1 1.5 1.5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>',
    '<line x1="21" y1="17" x2="23" y2="19" stroke="white" stroke-width="1.8" stroke-linecap="round"/>',
    '</svg>'
  ].join('');
  var svgB64='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svgIcon)));
  var markerImg=new kakao.maps.MarkerImage(svgB64,new kakao.maps.Size(38,38),{offset:new kakao.maps.Point(19,38)});

  var kmList=[];
  catches.forEach(function(cc){
    var km=new kakao.maps.Marker({
      position:mkLatLng(cc.lat,cc.lng),
      image:markerImg,
      clickable:true
    });
    kakao.maps.event.addListener(km,'click',(function(ccc){return function(){openCatch(ccc);};})(cc));
    ALL_CATCH_MARKERS.push(km);
    kmList.push(km);
  });

  CATCH_CLUSTERER=new kakao.maps.MarkerClusterer({
    map:MAP,
    markers:kmList,
    averageCenter:true,
    minLevel:4,
    minClusterSize:2,
    disableClickZoom:true,
    styles:[
      {width:'46px',height:'46px',background:'radial-gradient(circle at 38% 32%,#4d8cff,#0038cc)',borderRadius:'50%',border:'2.5px solid rgba(255,255,255,.92)',color:'#fff',textAlign:'center',lineHeight:'46px',fontWeight:'900',fontSize:'14px',fontFamily:"'Noto Sans KR',sans-serif",boxShadow:'0 4px 14px rgba(26,107,255,.55)'},
      {width:'58px',height:'58px',background:'radial-gradient(circle at 38% 32%,#3a7aff,#0028b8)',borderRadius:'50%',border:'3px solid rgba(255,255,255,.94)',color:'#fff',textAlign:'center',lineHeight:'58px',fontWeight:'900',fontSize:'16px',fontFamily:"'Noto Sans KR',sans-serif",boxShadow:'0 5px 18px rgba(26,107,255,.6)'},
      {width:'70px',height:'70px',background:'radial-gradient(circle at 38% 32%,#2a68ff,#0018a8)',borderRadius:'50%',border:'3px solid rgba(255,255,255,.96)',color:'#fff',textAlign:'center',lineHeight:'70px',fontWeight:'900',fontSize:'19px',fontFamily:"'Noto Sans KR',sans-serif",boxShadow:'0 6px 22px rgba(26,107,255,.65)'},
    ]
  });

  // 클러스터 클릭 → 한 단계씩 줌인
  kakao.maps.event.addListener(CATCH_CLUSTERER,'clusterclick',function(cluster){
    var lv=MAP.getLevel();
    var nextLv=Math.max(2,lv-1);
    MAP.setCenter(cluster.getCenter());
    MAP.setLevel(nextLv,{animate:true});
    if(nextLv<=4){
      var displayQ=G.searchQ||G.q;
      setTimeout(function(){showSheet(displayQ);},400);
    }
  });
}

function hideCTA(){
  var el=document.getElementById('cta');
  if(!el)return;
  el.style.opacity='0';el.style.transform='translateY(10px)';
  setTimeout(function(){el.style.display='none';},300);
  G.ctaOn=false;
}

function toggleFav(){
  var s=document.getElementById('fav-svg');
  if(!s)return;
  if(s.getAttribute('fill')==='none'){
    s.setAttribute('fill','#FFC300');s.setAttribute('stroke','#E6A800');
    showToast('즐겨찾기에 추가됨');
  } else {
    s.setAttribute('fill','none');s.setAttribute('stroke','var(--sub)');
    showToast('즐겨찾기 해제됨');
  }
}

function toggleStar(i){
  CATCHES[i].starred=!CATCHES[i].starred;
  var el=document.getElementById('fav'+i);
  if(el)el.classList.toggle('on',CATCHES[i].starred);
}

function showSheet(q){
  renderSheet(q);

function renderPrefDots(s){

function selDate(v){G.pref.date=v;renderPref();}

    // Tide
    +'<div class="plan-card" style="margin-top:10px;">'
      +'<div class="pc-head"><div class="pc-ttl"><div class="pc-ico" style="background:#e3f0ff;">🌊</div>조수 예보</div></div>'
      +'<div class="tide-chart">'
        +'<div class="tide-bar-wrap">'
          +[{h:45,c:'ok'},{h:65,c:'good'},{h:85,c:'best'},{h:90,c:'best'},{h:80,c:'best'},{h:60,c:'good'},{h:40,c:'ok'},{h:25,c:'ok'},{h:20,c:'ok'},{h:30,c:'ok'},{h:50,c:'good'},{h:70,c:'good'}].map(function(b){
            return '<div class="tide-bar '+b.c+'" style="height:'+b.h+'%"></div>';
          }).join('')
        +'</div>'
        +'<div class="tide-labels">'+['03','05','07','09','11','13','15','17','19','21','23','01'].map(function(h){return '<span class="tide-lbl">'+h+'</span>';}).join('')+'</div>'
        +'<div class="tide-legend"><div class="tl-item"><div class="tl-dot" style="background:#34C759;"></div>최적</div><div class="tl-item"><div class="tl-dot" style="background:#4B9FFF;"></div>양호</div><div class="tl-item"><div class="tl-dot" style="background:#E5E5EA;"></div>주의</div></div>'
      +'</div>'
    +'</div>'
    // Timeline
    +'<div class="plan-card" style="margin-top:10px;">'
      +'<div class="pc-head"><div class="pc-ttl"><div class="pc-ico" style="background:#f0e6ff;">📍</div>상세 일정</div></div>'
      +'<div class="tl-card">'
        +items.map(function(it,i){
          return '<div class="tl2-row">'
            +(i<items.length-1?'<div class="tl2-line"></div>':'')
            +'<div class="tl2-time">'+it.t+'</div>'
            +'<div class="tl2-dot'+(it.isActive?' active':'')+'"></div>'
            +'<div class="tl2-body">'
              +'<div class="tl2-title">'+it.title+'</div>'
              +(it.move?'<div class="tl2-move"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>'+it.move+'</div>':'')
              +'<div class="tl2-desc">'+it.desc+'</div>'
              +(it.tags&&it.tags.length?'<div class="tl2-tag-row">'+it.tags.map(function(t){return '<span class="tl2-tag">'+t+'</span>';}).join('')+'</div>':'')
              +(it.link?'<div class="tl2-link"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>'+it.link+'</div>':'')
            +'</div>'
          +'</div>';
        }).join('')
      +'</div>'
    +'</div>'
    // Cost
    +'<div class="plan-card" style="margin-top:10px;">'
      +'<div class="pc-head"><div class="pc-ttl"><div class="pc-ico" style="background:#e8f8ee;">💰</div>예상 비용 (1인 기준)</div></div>'
      +'<div class="cost-list">'
        +'<div class="cost-row"><span class="cost-label">선박 출조비</span><span class="cost-val">'+((boat.price||110000)).toLocaleString()+'원</span></div>'
        +(p.food?'<div class="cost-row"><span class="cost-label">식사비 <span>'+foodNm+'</span></span><span class="cost-val">'+foodPrice.toLocaleString()+'원</span></div>':'')
        +(p.stay?'<div class="cost-row"><span class="cost-label">숙박비 <span>'+stayNm+'</span></span><span class="cost-val">'+stayPrice.toLocaleString()+'원~</span></div>':'')
        +(gearCost?'<div class="cost-row"><span class="cost-label">입문 장비 렌탈</span><span class="cost-val">'+gearCost.toLocaleString()+'원</span></div>':'')
        +'<div class="cost-row"><span class="cost-label">톨게이트·주차비</span><span class="cost-val">12,000원</span></div>'
      +'</div>'
      +'<div class="cost-total"><span class="cost-total-lbl">총 예상 비용</span><span class="cost-total-val">'+totalCost.toLocaleString()+'원~</span></div>'
    +'</div>'
    // Checklist
    +'<div class="plan-card" style="margin-top:10px;">'
      +'<div class="pc-head"><div class="pc-ttl"><div class="pc-ico" style="background:#fef3e2;">📦</div>챙겨야 할 것</div><div class="pc-action" onclick="checkAll()">모두 체크</div></div>'
      +'<div class="check-grid">'
        +CHECKLIST.map(function(item,i){return '<div class="check-item" id="ck'+i+'" onclick="toggleCheck('+i+')"><div class="check-box"><svg viewBox="0 0 12 10"><polyline points="1 5 4 8 11 1"/></svg></div><span class="check-txt">'+item+'</span></div>';}).join('')
      +'</div>'
    +'</div>'
    +'<div style="height:16px;"></div>';

  document.getElementById('final-body').innerHTML=html;
  document.getElementById('final-acts').innerHTML=
    '<div style="display:flex;flex-direction:column;gap:8px;width:100%;">'
    +'<button class="tmap-nav-btn" onclick="openTMapRoute()">'
      +'<svg viewBox="0 0 24 24"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>'
      +'이 경로로 T map 바로가기'
    +'</button>'
    +'<div style="display:flex;gap:8px;">'
      +'<button class="pa pa-no" style="flex:1;" onclick="G.pref.step=1;renderPref();closePanel(\'panel-final\');openPanel(\'panel-pref\');">다시 선택</button>'
      +'<button class="pa pa-yes" style="flex:1;" onclick="savePlan()">플랜 저장 💾</button>'
    +'</div>'
    +'</div>';
}

function checkAll(){CHECKLIST.forEach(function(_,i){document.getElementById('ck'+i).classList.add('done');});}
function toggleCheck(i){document.getElementById('ck'+i).classList.toggle('done');}
function savePlan(){
  var p=G.pref, boat=G.selBoat||BOATS[0];
  var fishName=G.q||(CATCHES.length>0?CATCHES[0].fish:'낚시');
  var dateStr='날짜 미정';
  if(p.date){var pts=p.date.split('-');dateStr=pts[1]+'월 '+pts[2]+'일';}
  var plan={
    id:Date.now(),
    fish:fishName,
    date:dateStr,
    boat:boat.name,
    people:p.people||'1명',
    stay:p.stay,stayType:p.stayType,
    food:p.food,foodType:p.foodType,
    loc:boat.loc.split('·').pop().trim()
  };
  SAVED_PLANS.unshift(plan);
  // Close final panel and show saved toast with link
  closePanel('panel-final');
  closeBoat();
  showToast('📅 플랜이 저장되었습니다!');
  renderSavedPlans();
}

function renderSavedPlans(){
  var FOOD_LABEL={seafood:'활어·해산물',grill:'생선구이',korean:'백반·한정식',meat:'고기·구이',cafe:'오션뷰 카페'};
  var STAY_LABEL={camping:'캠핑',pension:'펜션',hotel:'호텔',motel:'모텔/GH'};
  if(!SAVED_PLANS.length){
    document.getElementById('plans-body').innerHTML='<div style="padding:40px 20px;text-align:center;color:var(--muted);font-size:14px;">저장된 플랜이 없습니다</div>';
    return;
  }
  document.getElementById('plans-body').innerHTML=SAVED_PLANS.map(function(pl,i){
    var tags=[pl.fish, pl.people];
    if(pl.stay) tags.push(STAY_LABEL[pl.stayType]||'숙박');
    if(pl.food) tags.push(FOOD_LABEL[pl.foodType]||'맛집');
    return '<div style="margin:12px 16px;background:#fff;border:1px solid var(--g2);border-radius:16px;overflow:hidden;">'
      +'<div style="background:linear-gradient(135deg,#0d1f3c,#1a3a6b);padding:14px 16px;">'
        +'<div style="font-size:12px;color:rgba(255,255,255,.6);margin-bottom:4px;">'+pl.date+'</div>'
        +'<div style="font-size:17px;font-weight:800;color:#fff;">'+pl.fish+' 출조 플랜</div>'
        +'<div style="font-size:12px;color:rgba(255,255,255,.7);margin-top:4px;">'+pl.boat+' · '+pl.loc+'</div>'
      +'</div>'
      +'<div style="padding:12px 16px;display:flex;flex-wrap:wrap;gap:6px;">'
        +tags.map(function(t){return '<span style="background:var(--g1);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--sub);">'+t+'</span>';}).join('')
      +'</div>'
      +'<div style="padding:0 16px 14px;display:flex;gap:8px;">'
        +'<button onclick="deletePlan('+i+')" style="flex:1;padding:10px;border:1.5px solid var(--g2);border-radius:10px;background:#fff;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit;">삭제</button>'
        +'<button onclick="G.pref.step=1;renderPref();openPanel(\'panel-pref\');" style="flex:2;padding:10px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">다시 출조 예약</button>'
      +'</div>'
    +'</div>';
  }).join('');
}

function deletePlan(i){
  SAVED_PLANS.splice(i,1);
  renderSavedPlans();
}

function openSavedPlans(){
  renderSavedPlans();
  openPanel('panel-plans');
}

function openTMapRoute(){
  var boat=G.selBoat||BOATS[0];
  // TMap 앱 딥링크 (앱 설치시) → 웹 fallback
  var goalLat=boat.lat||34.581;
  var goalLng=boat.lng||127.263;
  var goalName=encodeURIComponent(boat.name||'선착장');
  // TMap 앱 딥링크
  var tmapApp='tmap://route?goalname='+goalName+'&goalx='+goalLng+'&goaly='+goalLat+'&reqCoordType=WGS84GEO&resCoordType=WGS84GEO';
  // TMap 웹 fallback
  var tmapWeb='https://tmap.life/route?goalx='+goalLng+'&goaly='+goalLat+'&goalname='+goalName;
  // 앱 열기 시도 후 실패하면 웹으로
  var iframe=document.createElement('iframe');
  iframe.style.display='none';
  iframe.src=tmapApp;
  document.body.appendChild(iframe);
  setTimeout(function(){
    document.body.removeChild(iframe);
    window.open(tmapWeb,'_blank');
  },1500);
  showToast('🗺 T map으로 연결 중...');
}

// ── UTILS ─────────────────────────────────────────────────────
function openPanel(id){document.getElementById(id).classList.add('open');}
function closePanel(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

// ── BOOT ──────────────────────────────────────────────────────
// 카카오맵 초기화 - GitHub Pages 호환
function _startMap(){
  if(typeof kakao!=='undefined'&&kakao.maps&&kakao.maps.Map){
    initMap();
  } else if(typeof kakao!=='undefined'&&kakao.maps){
    kakao.maps.load(initMap);
  } else {
    // SDK 로드 실패 - SVG fallback
    var el=document.getElementById('map');
    if(el){el.innerHTML=svgKoreaMap();el.style.background='#c8d9e6';addSVGMarkers();}
  }
}
if(document.readyState==='complete'){
  _startMap();
} else {
  window.addEventListener('load', _startMap);
}
</script>
